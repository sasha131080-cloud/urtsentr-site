        .phone { font-size: 24px; color: #1a237e; text-align: center; margin: 20px 0; }
        .articles { display: grid; gap: 20px; }
        .article-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .article-card h3 { margin: 0 0 10px; color: #1a237e; }
        .article-card a { color: #1a237e; text-decoration: none; }
        .article-card a:hover { text-decoration: underline; }

<body>
    <div class="header">
        <h1>ЮРЦЕНТР</h1>
        <p>Ваша проблема — наше решение</p>
    </div>
    <div class="container">
        <div class="phone">
            Бесплатная консультация: <a href="tel:89020149407" style="color:#1a237e;text-decoration:none;">8-902-014-94-07</a>

    <script>
        fetch('posts/list.json').then(r=>r.json()).then(posts=>{
            const list = document.getElementById('posts-list');
            if (posts.length) {
                list.innerHTML = posts.map(p =>
                    '<div class="article-card">' +
                    '<h3><a href="posts/' + p.file + '">' + p.title + '</a></h3>' +
                    '<small>' + p.date + '</small>' +
                    '</div>'
                ).join('');
            } else { list.innerHTML = '<p>Новости скоро появятся</p>'; }
        }).catch(()=>{
            document.getElementById('posts-list').innerHTML = '<p>Новости скоро появятся</p>';
        });
        fetch('articles/list.json').then(r=>r.json()).then(articles=>{
            const list = document.getElementById('articles-list');
            list.innerHTML = articles.map(a =>
                '<div class="article-card">' +
                '<h3><a href="articles/' + a.file + '">' + a.title + '</a></h3>' +
                '<p>' + a.desc + '</p>' +
                '<small>' + a.date + '</small>' +
                '</div>'
            ).join('');
        });
    </script>
